{% extends 'core/base.html' %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card-cv">
                <div class="card-header-cv">
                    <h4 class="mb-0"><i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión</h4>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="username" class="form-label">Usuario</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Contraseña</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-cv-primary w-100">
                            <i class="fas fa-key"></i> Ingresar
                        </button>
                    </form>
                    <div class="text-center mt-3">
                        <small>¿No tienes cuenta? <a href="{% url 'core:register' %}">Regístrate</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
